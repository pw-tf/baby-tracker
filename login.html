<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1117">
    <title>Baby Tracker — Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">👶</div>
            <h1 class="login-title">Baby Tracker</h1>
            <p class="login-subtitle">Sign in to continue</p>

            <div id="login-error" class="login-error"></div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="you@email.com" autocomplete="email" autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button id="login-btn" class="btn btn-primary" style="margin-top: 8px;">Sign In</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');

        // If already logged in, redirect
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        })();

        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please enter email and password.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in…';
            loginError.style.display = 'none';

            const { error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                showError(error.message);
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                return;
            }

            window.location.href = 'dashboard.html';
        }

        function showError(msg) {
            loginError.textContent = msg;
            loginError.style.display = 'block';
        }

        loginBtn.addEventListener('click', handleLogin);

        // Enter key support
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        emailInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });
    </script>
</body>
</html>
