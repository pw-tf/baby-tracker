<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1117">
    <title>Baby Tracker — Feeding</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header-bar">
            <a href="dashboard.html" class="logo">
                <span class="logo-icon">🍼</span>
                Feeding
            </a>
            <button class="btn-logout" onclick="signOut()">Sign Out</button>
        </div>

        <!-- Input Mode Toggle -->
        <div class="input-mode-toggle">
            <button class="mode-btn active" data-mode="timer" onclick="setMode('timer')">Timer</button>
            <button class="mode-btn" data-mode="manual" onclick="setMode('manual')">Manual Entry</button>
        </div>

        <!-- Feed Type Selection -->
        <div class="card">
            <label class="form-label">Feed Type</label>
            <div class="toggle-group">
                <button class="toggle-btn active" data-type="breast" onclick="setFeedType('breast')">🤱 Breast</button>
                <button class="toggle-btn" data-type="bottle" onclick="setFeedType('bottle')">🍼 Bottle</button>
                <button class="toggle-btn" data-type="solids" onclick="setFeedType('solids')">🥣 Solids</button>
            </div>

            <!-- Breast Side (shown for breast only) -->
            <div id="breast-options" style="margin-top: 16px;">
                <label class="form-label">Side</label>
                <div class="toggle-group">
                    <button class="toggle-btn active" data-side="left" onclick="setSide('left')">Left</button>
                    <button class="toggle-btn" data-side="right" onclick="setSide('right')">Right</button>
                    <button class="toggle-btn" data-side="both" onclick="setSide('both')">Both</button>
                </div>
            </div>

            <!-- Volume (shown for bottle only) -->
            <div id="bottle-options" style="margin-top: 16px; display: none;">
                <label class="form-label" for="volume">Volume (mL)</label>
                <input type="number" id="volume" class="form-input" placeholder="e.g. 120" min="0" step="5">
            </div>

            <!-- Timer Mode -->
            <div id="timer-section" style="margin-top: 20px;">
                <div class="timer-display">
                    <div class="timer-time" id="timer-display">00:00:00</div>
                    <div class="timer-label" id="timer-label">Ready</div>
                </div>
                <div class="timer-controls">
                    <button id="timer-start-btn" class="btn btn-timer-start" onclick="toggleTimer()">Start</button>
                    <button id="timer-save-btn" class="btn btn-primary" onclick="saveTimerEntry()" style="display: none;">Save</button>
                </div>
            </div>

            <!-- Manual Mode -->
            <div id="manual-section" style="margin-top: 20px; display: none;">
                <div class="form-group">
                    <label class="form-label" for="manual-start">Start Time</label>
                    <input type="datetime-local" id="manual-start" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="manual-end">End Time</label>
                    <input type="datetime-local" id="manual-end" class="form-input">
                </div>
                <div id="manual-duration" class="timer-label" style="text-align: center; margin-bottom: 12px;"></div>
                <button class="btn btn-primary" onclick="saveManualEntry()">Save Entry</button>
            </div>

            <!-- Notes -->
            <div class="form-group" style="margin-top: 16px;">
                <label class="form-label" for="notes">Notes</label>
                <textarea id="notes" class="form-textarea" placeholder="Optional notes..." rows="2"></textarea>
            </div>
        </div>

        <!-- Chart -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Feeding Frequency</span>
            </div>
            <div class="date-range-bar" id="date-range-bar">
                <button class="range-btn" data-range="24h">24h</button>
                <button class="range-btn active" data-range="7d">7 days</button>
                <button class="range-btn" data-range="14d">14 days</button>
                <button class="range-btn" data-range="30d">30 days</button>
            </div>
            <div class="chart-container">
                <canvas id="feeding-chart"></canvas>
            </div>
        </div>

        <!-- Recent Entries -->
        <div class="entry-list">
            <div class="entry-list-header">
                <span class="entry-list-title">Recent Feedings</span>
            </div>
            <div id="entry-list-container">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; display:none; align-items:center; justify-content:center;">
        <div class="card" style="max-width:320px; margin:auto; text-align:center;">
            <p style="margin-bottom:16px;">Delete this feeding entry?</p>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary btn-small" onclick="closeDeleteModal()" style="flex:1;">Cancel</button>
                <button class="btn btn-danger btn-small" id="confirm-delete-btn" style="flex:1;">Delete</button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" id="main-nav"></nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script>
        Chart.defaults.color = '#9295a5';
        Chart.defaults.borderColor = '#2e3142';
        Chart.defaults.font.family = "'DM Sans', sans-serif";

        // State
        let feedType = 'breast';
        let breastSide = 'left';
        let inputMode = 'timer';
        let currentRange = '7d';
        let feedingChart = null;

        // Timer state
        let timerRunning = false;
        let timerStart = null;
        let timerInterval = null;

        // Delete state
        let deleteId = null;

        (async () => {
            const session = await requireAuth();
            if (!session) return;
            initNav('feeding.html');
            prefillManualTimes();
            setupRangeButtons();
            setupManualDurationCalc();
            await loadEntries();
            await loadChart();
        })();

        // --- Mode switching ---
        function setMode(mode) {
            inputMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            document.getElementById('timer-section').style.display = mode === 'timer' ? 'block' : 'none';
            document.getElementById('manual-section').style.display = mode === 'manual' ? 'block' : 'none';
        }

        // --- Feed type ---
        function setFeedType(type) {
            feedType = type;
            document.querySelectorAll('[data-type]').forEach(b => b.classList.toggle('active', b.dataset.type === type));
            document.getElementById('breast-options').style.display = type === 'breast' ? 'block' : 'none';
            document.getElementById('bottle-options').style.display = type === 'bottle' ? 'block' : 'none';
        }

        function setSide(side) {
            breastSide = side;
            document.querySelectorAll('[data-side]').forEach(b => b.classList.toggle('active', b.dataset.side === side));
        }

        // --- Timer ---
        function toggleTimer() {
            if (!timerRunning) {
                startTimer();
            } else {
                stopTimer();
            }
        }

        function startTimer() {
            timerRunning = true;
            timerStart = new Date();
            document.getElementById('timer-start-btn').textContent = 'Stop';
            document.getElementById('timer-start-btn').className = 'btn btn-timer-stop';
            document.getElementById('timer-save-btn').style.display = 'none';
            document.getElementById('timer-label').textContent = 'Started at ' + formatTime(timerStart.toISOString());

            timerInterval = setInterval(() => {
                const elapsed = Date.now() - timerStart.getTime();
                document.getElementById('timer-display').textContent = formatElapsed(elapsed);
            }, 1000);
        }

        function stopTimer() {
            timerRunning = false;
            clearInterval(timerInterval);
            document.getElementById('timer-start-btn').textContent = 'Start';
            document.getElementById('timer-start-btn').className = 'btn btn-timer-start';
            document.getElementById('timer-save-btn').style.display = 'block';
            document.getElementById('timer-label').textContent = 'Stopped — tap Save to log';
        }

        function formatElapsed(ms) {
            const totalSec = Math.floor(ms / 1000);
            const hrs = Math.floor(totalSec / 3600);
            const mins = Math.floor((totalSec % 3600) / 60);
            const secs = totalSec % 60;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // --- Save timer entry ---
        async function saveTimerEntry() {
            if (!timerStart) return;
            const userId = await getUserId();
            const endTime = new Date();

            const entry = {
                user_id: userId,
                feed_type: feedType,
                start_time: timerStart.toISOString(),
                end_time: endTime.toISOString(),
                notes: document.getElementById('notes').value.trim() || null,
            };

            if (feedType === 'breast') entry.breast_side = breastSide;
            if (feedType === 'bottle') {
                const vol = document.getElementById('volume').value;
                if (vol) entry.volume_ml = Number(vol);
            }

            const { error } = await sb.from('feedings').insert(entry);
            if (error) {
                showToast('Error saving: ' + error.message, 'error');
                return;
            }

            showToast('Feeding logged!');
            resetForm();
            await loadEntries();
            await loadChart();
        }

        // --- Save manual entry ---
        async function saveManualEntry() {
            const userId = await getUserId();
            const startVal = document.getElementById('manual-start').value;
            const endVal = document.getElementById('manual-end').value;

            if (!startVal) {
                showToast('Please set a start time.', 'error');
                return;
            }

            const entry = {
                user_id: userId,
                feed_type: feedType,
                start_time: new Date(startVal).toISOString(),
                end_time: endVal ? new Date(endVal).toISOString() : null,
                notes: document.getElementById('notes').value.trim() || null,
            };

            if (feedType === 'breast') entry.breast_side = breastSide;
            if (feedType === 'bottle') {
                const vol = document.getElementById('volume').value;
                if (vol) entry.volume_ml = Number(vol);
            }

            const { error } = await sb.from('feedings').insert(entry);
            if (error) {
                showToast('Error saving: ' + error.message, 'error');
                return;
            }

            showToast('Feeding logged!');
            resetForm();
            await loadEntries();
            await loadChart();
        }

        function resetForm() {
            timerStart = null;
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('timer-display').textContent = '00:00:00';
            document.getElementById('timer-label').textContent = 'Ready';
            document.getElementById('timer-start-btn').textContent = 'Start';
            document.getElementById('timer-start-btn').className = 'btn btn-timer-start';
            document.getElementById('timer-save-btn').style.display = 'none';
            document.getElementById('notes').value = '';
            document.getElementById('volume').value = '';
            prefillManualTimes();
        }

        function prefillManualTimes() {
            const now = new Date();
            document.getElementById('manual-start').value = toDatetimeLocal(now);
            document.getElementById('manual-end').value = '';
        }

        function setupManualDurationCalc() {
            const startInput = document.getElementById('manual-start');
            const endInput = document.getElementById('manual-end');
            const durationEl = document.getElementById('manual-duration');

            function calc() {
                if (startInput.value && endInput.value) {
                    const ms = new Date(endInput.value) - new Date(startInput.value);
                    durationEl.textContent = ms > 0 ? `Duration: ${formatDuration(ms)}` : 'End must be after start';
                } else {
                    durationEl.textContent = '';
                }
            }

            startInput.addEventListener('change', calc);
            endInput.addEventListener('change', calc);
        }

        // --- Load entries ---
        async function loadEntries() {
            const userId = await getUserId();
            const { data, error } = await sb
                .from('feedings')
                .select('*')
                .eq('user_id', userId)
                .order('start_time', { ascending: false })
                .limit(20);

            const container = document.getElementById('entry-list-container');

            if (error || !data || data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🍼</div>
                        <div class="empty-state-text">No feedings logged yet</div>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(entry => {
                const icon = entry.feed_type === 'breast' ? '🤱' : entry.feed_type === 'bottle' ? '🍼' : '🥣';
                const typeLabel = entry.feed_type.charAt(0).toUpperCase() + entry.feed_type.slice(1);
                let detail = '';

                if (entry.feed_type === 'breast' && entry.breast_side) {
                    detail = entry.breast_side.charAt(0).toUpperCase() + entry.breast_side.slice(1);
                }
                if (entry.feed_type === 'bottle' && entry.volume_ml) {
                    detail = entry.volume_ml + ' mL';
                }

                const duration = entry.end_time ? formatDuration(durationBetween(entry.start_time, entry.end_time)) : '—';
                const notes = entry.notes ? ` · ${entry.notes}` : '';

                return `
                    <div class="entry-item">
                        <div class="entry-icon">${icon}</div>
                        <div class="entry-content">
                            <div class="entry-title">${typeLabel}${detail ? ' · ' + detail : ''}</div>
                            <div class="entry-meta">${duration}${notes}</div>
                        </div>
                        <div class="entry-time">${formatDateTime(entry.start_time)}</div>
                        <div class="entry-actions">
                            <button class="btn-icon delete" onclick="confirmDelete('${entry.id}')" title="Delete">🗑</button>
                        </div>
                    </div>`;
            }).join('');
        }

        // --- Delete ---
        function confirmDelete(id) {
            deleteId = id;
            const modal = document.getElementById('delete-modal');
            modal.style.display = 'flex';
            document.getElementById('confirm-delete-btn').onclick = async () => {
                const { error } = await sb.from('feedings').delete().eq('id', deleteId);
                if (error) {
                    showToast('Error deleting: ' + error.message, 'error');
                } else {
                    showToast('Entry deleted');
                }
                closeDeleteModal();
                await loadEntries();
                await loadChart();
            };
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').style.display = 'none';
            deleteId = null;
        }

        // --- Chart ---
        function setupRangeButtons() {
            document.getElementById('date-range-bar').addEventListener('click', (e) => {
                const btn = e.target.closest('.range-btn');
                if (!btn) return;
                document.querySelectorAll('#date-range-bar .range-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRange = btn.dataset.range;
                loadChart();
            });
        }

        async function loadChart() {
            const userId = await getUserId();
            const { start, end } = getDateRange(currentRange);

            const { data } = await sb
                .from('feedings')
                .select('start_time, feed_type')
                .eq('user_id', userId)
                .gte('start_time', start)
                .lte('start_time', end)
                .order('start_time', { ascending: true });

            const entries = data || [];
            const labels = generateDateLabels();

            const breastGrouped = {};
            const bottleGrouped = {};
            const solidsGrouped = {};

            entries.forEach(e => {
                const day = new Date(e.start_time).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
                if (e.feed_type === 'breast') breastGrouped[day] = (breastGrouped[day] || 0) + 1;
                else if (e.feed_type === 'bottle') bottleGrouped[day] = (bottleGrouped[day] || 0) + 1;
                else solidsGrouped[day] = (solidsGrouped[day] || 0) + 1;
            });

            function mapToLabels(labels, grouped) {
                return labels.map(l => grouped[l] || 0);
            }

            function generateDateLabels() {
                const { start } = getDateRange(currentRange);
                const labels = [];
                const d = new Date(start);
                const now = new Date();
                while (d <= now) {
                    labels.push(d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }));
                    d.setDate(d.getDate() + 1);
                }
                return labels;
            }

            if (feedingChart) feedingChart.destroy();
            feedingChart = new Chart(document.getElementById('feeding-chart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Breast',
                            data: mapToLabels(labels, breastGrouped),
                            backgroundColor: 'rgba(108, 99, 255, 0.15)',
                            borderColor: '#6c63ff',
                            borderWidth: 1.5,
                            borderRadius: 4,
                        },
                        {
                            label: 'Bottle',
                            data: mapToLabels(labels, bottleGrouped),
                            backgroundColor: 'rgba(76, 201, 240, 0.15)',
                            borderColor: '#4cc9f0',
                            borderWidth: 1.5,
                            borderRadius: 4,
                        },
                        {
                            label: 'Solids',
                            data: mapToLabels(labels, solidsGrouped),
                            backgroundColor: 'rgba(245, 166, 35, 0.15)',
                            borderColor: '#f5a623',
                            borderWidth: 1.5,
                            borderRadius: 4,
                        },
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: { boxWidth: 12, padding: 12 },
                        },
                        tooltip: {
                            backgroundColor: '#1e2029',
                            borderColor: '#2e3142',
                            borderWidth: 1,
                            padding: 10,
                            cornerRadius: 8,
                        },
                    },
                    scales: {
                        x: {
                            stacked: true,
                            grid: { display: false },
                            ticks: { maxRotation: 45, font: { size: 11 }, maxTicksLimit: 10 },
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true,
                            grid: { color: '#2e3142' },
                            title: { display: true, text: 'Count', font: { size: 12 } },
                            ticks: { font: { size: 11 }, precision: 0 },
                        },
                    },
                },
            });
        }
    </script>
</body>
</html>
