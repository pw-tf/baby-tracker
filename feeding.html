<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1117">
    <title>Baby Tracker — Feeding</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* --- Burp Timer Styles --- */
        .burp-phase-display {
            text-align: center;
            padding: 32px 16px;
            border-radius: var(--radius-md);
            transition: background 0.4s var(--ease-out-expo), color 0.4s var(--ease-out-expo);
        }

        .burp-phase-display.down {
            background: var(--info-bg);
            color: var(--info);
        }

        .burp-phase-display.up {
            background: var(--success-bg);
            color: var(--success);
        }

        .burp-phase-icon {
            margin-bottom: 8px;
        }

        .burp-phase-icon .icon {
            width: 56px;
            height: 56px;
        }

        .burp-phase-label {
            font-size: 2.5rem;
            font-weight: var(--weight-bold);
            letter-spacing: var(--tracking-tight);
            line-height: 1;
            margin-bottom: 8px;
        }

        .burp-phase-countdown {
            font-size: var(--text-3xl);
            font-weight: var(--weight-bold);
            font-variant-numeric: tabular-nums;
        }

        .burp-total-bar {
            margin-top: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
        }

        .burp-total-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .burp-cycle-label {
            font-size: 0.85rem;
            font-weight: var(--weight-semibold);
            color: var(--text-primary);
        }

        .burp-total-countdown {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        .burp-progress-track {
            height: 6px;
            background: var(--bg-input);
            border-radius: 3px;
            overflow: hidden;
        }

        .burp-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 1s linear;
            width: 0%;
        }

        .burp-done-display {
            text-align: center;
            padding: 32px 16px;
            background: var(--success-bg);
            border-radius: var(--radius-md);
        }

        .burp-done-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .burp-done-text {
            font-size: 1.2rem;
            font-weight: var(--weight-semibold);
            color: var(--success);
        }

        @keyframes burp-phase-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .burp-phase-display.phase-change {
            animation: burp-phase-pop 0.4s var(--ease-out-expo);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header-bar">
            <a href="dashboard.html" class="logo">
                <span class="logo-icon" id="logo-icon"></span>
                Feeding
            </a>
            <button class="btn-logout" onclick="signOut()">Sign Out</button>
        </div>

        <!-- Feed Components Builder -->
        <div class="card">
            <label class="form-label">Feed Components</label>
            <div class="component-toggles">
                <button class="toggle-btn component-toggle active" data-component="bottle" onclick="toggleComponent('bottle')"><span id="toggle-bottle-icon"></span> Bottle</button>
                <button class="toggle-btn component-toggle" data-component="solids" onclick="toggleComponent('solids')"><span id="toggle-solids-icon"></span> Solids</button>
                <button class="toggle-btn component-toggle" data-component="burps" onclick="toggleComponent('burps')"><span id="toggle-burps-icon"></span> Burps</button>
            </div>
            <p class="component-hint">Select one or more</p>

            <!-- Bottle Options -->
            <div id="bottle-section" class="component-section" style="display:none;">
                <label class="form-label" for="volume">Volume (mL)</label>
                <input type="number" id="volume" class="form-input" placeholder="e.g. 120" min="0" step="5">
                <div class="form-group" style="margin-top: 12px;">
                    <label class="form-label" for="bottle-time">Time <span class="optional-hint">(optional - defaults to now)</span></label>
                    <input type="datetime-local" id="bottle-time" class="form-input">
                </div>
            </div>

            <!-- Solids Options -->
            <div id="solids-section" class="component-section" style="display:none;">
                <div class="form-group">
                    <label class="form-label" for="solids-time">Time <span class="optional-hint">(optional - defaults to now)</span></label>
                    <input type="datetime-local" id="solids-time" class="form-input">
                </div>
            </div>

            <!-- Burps Section -->
            <div id="burps-section" class="component-section" style="display:none;">
                <!-- Setup (before timer starts) -->
                <div id="burp-setup">
                    <div class="form-group">
                        <label class="form-label" for="burp-duration">Timer Duration (minutes)</label>
                        <input type="number" id="burp-duration" class="form-input" value="15" min="1" max="60" step="1">
                    </div>
                    <button class="btn btn-primary" onclick="startBurpTimer()" style="background: var(--info);">Start Burp Timer</button>
                </div>

                <!-- Active timer display -->
                <div id="burp-active" style="display:none;">
                    <div class="burp-phase-display" id="burp-phase-display">
                        <div class="burp-phase-icon" id="burp-phase-icon"></div>
                        <div class="burp-phase-label" id="burp-phase-label">DOWN</div>
                        <div class="burp-phase-countdown" id="burp-phase-countdown">2:00</div>
                    </div>
                    <div class="burp-total-bar">
                        <div class="burp-total-info">
                            <span class="burp-cycle-label" id="burp-cycle-label">Cycle 1</span>
                            <span class="burp-total-countdown" id="burp-total-countdown">15:00 remaining</span>
                        </div>
                        <div class="burp-progress-track">
                            <div class="burp-progress-fill" id="burp-progress-fill"></div>
                        </div>
                    </div>
                    <button class="btn btn-danger" onclick="stopBurpTimer()" style="margin-top: 12px;">Stop</button>
                </div>

                <!-- Completed state -->
                <div id="burp-done" style="display:none;">
                    <div class="burp-done-display">
                        <div class="burp-done-icon">✅</div>
                        <div class="burp-done-text">Burping complete!</div>
                    </div>
                    <button class="btn btn-secondary" onclick="resetBurpTimer()" style="margin-top: 12px;">Reset</button>
                </div>
            </div>

            <!-- Notes -->
            <div class="form-group" style="margin-top: 16px;" id="feed-notes-group">
                <label class="form-label" for="notes">Notes</label>
                <textarea id="notes" class="form-textarea" placeholder="Optional notes..." rows="2"></textarea>
            </div>

            <!-- Save Button -->
            <button class="btn btn-primary" id="save-feed-btn" onclick="saveFeed()">Save Feed</button>
        </div>

        <!-- Chart -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Feeding Frequency</span>
                <div class="input-mode-toggle" style="margin:0;">
                    <button class="mode-btn active" id="chart-view-bytype" onclick="setChartView('byType')">By Type</button>
                    <button class="mode-btn" id="chart-view-total" onclick="setChartView('total')">Total</button>
                </div>
            </div>
            <div class="date-range-bar" id="date-range-bar">
                <button class="range-btn" data-range="24h">24h</button>
                <button class="range-btn active" data-range="7d">7 days</button>
                <button class="range-btn" data-range="14d">14 days</button>
                <button class="range-btn" data-range="30d">30 days</button>
            </div>
            <div class="chart-container">
                <canvas id="feeding-chart"></canvas>
            </div>
        </div>

        <!-- Recent Entries -->
        <div class="entry-list">
            <div class="entry-list-header">
                <span class="entry-list-title">Recent Feedings</span>
            </div>
            <div id="entry-list-container">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal-overlay" style="display:none;">
        <div class="card modal-card">
            <p style="margin-bottom:16px;">Delete this feeding entry?</p>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary btn-small" onclick="closeDeleteModal()" style="flex:1;">Cancel</button>
                <button class="btn btn-danger btn-small" id="confirm-delete-btn" style="flex:1;">Delete</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="card modal-card modal-card-wide">
            <div class="modal-header">
                <span class="card-title">Edit Feed</span>
                <button class="btn-icon" onclick="closeEditModal()" title="Close" id="edit-modal-close-btn"></button>
            </div>
            <div id="edit-modal-body"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" id="main-nav"></nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Set icons
        document.getElementById('logo-icon').innerHTML = icon('milk');
        document.getElementById('toggle-bottle-icon').innerHTML = icon('milk');
        document.getElementById('toggle-solids-icon').innerHTML = icon('utensils');
        document.getElementById('toggle-burps-icon').innerHTML = icon('clock');
        document.getElementById('edit-modal-close-btn').innerHTML = icon('x');

        Chart.defaults.color = '#9295a5';
        Chart.defaults.borderColor = '#2e3142';
        Chart.defaults.font.family = "'DM Sans', sans-serif";

        // State
        let activeComponents = new Set(['bottle']);
        let currentRange = '7d';
        let chartView = 'byType';
        let feedingChart = null;

        // Delete/Edit state
        let deleteId = null;
        let deleteSessionId = null;
        let editEntries = null;

        (async () => {
            const session = await requireAuth();
            if (!session) return;
            initNav('feeding.html');
            setupRangeButtons();
            updateVisibility();
            await loadEntries();
            await loadChart();
        })();

        // --- Generate UUID v4 ---
        function uuid() {
            return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        // --- Visibility ---
        function updateVisibility() {
            document.getElementById('bottle-section').style.display = activeComponents.has('bottle') ? 'block' : 'none';
            document.getElementById('solids-section').style.display = activeComponents.has('solids') ? 'block' : 'none';
            document.getElementById('burps-section').style.display = activeComponents.has('burps') ? 'block' : 'none';

            const hasFeedComponent = activeComponents.has('bottle') || activeComponents.has('solids');
            document.getElementById('feed-notes-group').style.display = hasFeedComponent ? 'block' : 'none';
            document.getElementById('save-feed-btn').style.display = hasFeedComponent ? 'block' : 'none';
        }

        // --- Component toggles (multi-select) ---
        function toggleComponent(type) {
            if (activeComponents.has(type)) {
                if (activeComponents.size === 1) return; // keep at least one
                activeComponents.delete(type);
            } else {
                activeComponents.add(type);
            }
            document.querySelectorAll('.component-toggle').forEach(b => {
                b.classList.toggle('active', activeComponents.has(b.dataset.component));
            });
            updateVisibility();
        }

        // --- Save Feed (handles all components) ---
        async function saveFeed() {
            const userId = await getUserId();
            const sessionId = uuid();
            const notes = document.getElementById('notes').value.trim() || null;
            const records = [];

            if (activeComponents.has('bottle')) {
                const vol = document.getElementById('volume').value;
                if (!vol || Number(vol) <= 0) {
                    showToast('Enter a bottle volume.', 'error');
                    return;
                }
                // Use optional bottle time if set, otherwise current time
                const bottleTimeInput = document.getElementById('bottle-time').value;
                const bottleTime = bottleTimeInput ? new Date(bottleTimeInput).toISOString() : new Date().toISOString();
                records.push({
                    user_id: userId, session_id: sessionId,
                    feed_type: 'bottle', volume_ml: Number(vol),
                    start_time: bottleTime,
                    end_time: bottleTime,
                    notes: records.length === 0 ? notes : null,
                });
            }

            if (activeComponents.has('solids')) {
                // Use optional solids time if set, otherwise current time
                const solidsTimeInput = document.getElementById('solids-time').value;
                const solidsTime = solidsTimeInput ? new Date(solidsTimeInput).toISOString() : new Date().toISOString();
                records.push({
                    user_id: userId, session_id: sessionId,
                    feed_type: 'solids',
                    start_time: solidsTime,
                    end_time: solidsTime,
                    notes: records.length === 0 ? notes : null,
                });
            }

            if (records.length === 0) {
                showToast('No feed data to save.', 'error');
                return;
            }

            const { error } = await sb.from('feedings').insert(records);
            if (error) {
                showToast('Error saving: ' + error.message, 'error');
                return;
            }

            showToast('Feeding logged!');
            resetForm();
            await loadEntries();
            await loadChart();
        }

        function resetForm() {
            document.getElementById('notes').value = '';
            document.getElementById('volume').value = '';
            document.getElementById('bottle-time').value = '';
            document.getElementById('solids-time').value = '';
        }

        // --- Load entries (grouped by session) ---
        async function loadEntries() {
            const userId = await getUserId();
            const { data, error } = await sb
                .from('feedings')
                .select('*')
                .eq('user_id', userId)
                .order('start_time', { ascending: false })
                .limit(50);

            const container = document.getElementById('entry-list-container');

            if (error || !data || data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${icon('milk', 'icon-2xl')}</div>
                        <div class="empty-state-text">No feedings logged yet</div>
                    </div>`;
                return;
            }

            // Group by session_id (or treat each entry as its own session if no session_id)
            const sessions = new Map();
            data.forEach(entry => {
                const key = entry.session_id || entry.id;
                if (!sessions.has(key)) sessions.set(key, []);
                sessions.get(key).push(entry);
            });

            let count = 0;
            let html = '';
            for (const [sessionKey, entries] of sessions) {
                if (count >= 20) break;
                count++;
                const sessionId = entries[0].session_id;
                const isMulti = entries.length > 1;
                const earliest = entries.reduce((a, b) => new Date(a.start_time) < new Date(b.start_time) ? a : b);
                const notes = entries.find(e => e.notes)?.notes;

                if (isMulti) {
                    // Multi-component feed
                    const components = entries.map(e => {
                        const feedIcon = e.feed_type === 'bottle' ? icon('milk') : e.feed_type === 'solids' ? icon('utensils') : icon('milk');
                        let label = '';
                        if (e.feed_type === 'breast') {
                            const side = e.breast_side ? e.breast_side.charAt(0).toUpperCase() + e.breast_side.slice(1) : '';
                            const dur = e.end_time ? formatDuration(durationBetween(e.start_time, e.end_time)) : '—';
                            label = `${feedIcon} ${side} · ${dur}`;
                        } else if (e.feed_type === 'bottle') {
                            label = `${feedIcon} ${e.volume_ml ? e.volume_ml + ' mL' : 'Bottle'}`;
                        } else {
                            const dur = e.end_time ? formatDuration(durationBetween(e.start_time, e.end_time)) : '—';
                            label = `${feedIcon} Solids · ${dur}`;
                        }
                        return `<div class="session-component">${label}</div>`;
                    }).join('');

                    html += `
                        <div class="entry-item entry-session">
                            <div class="entry-content">
                                <div class="session-components">${components}</div>
                                ${notes ? `<div class="entry-meta">${notes}</div>` : ''}
                            </div>
                            <div class="entry-time">${formatDateTime(earliest.start_time)}</div>
                            <div class="entry-actions">
                                <button class="btn-icon edit" onclick="openEditModal('${sessionId || entries[0].id}')" title="Edit">${icon('pencil')}</button>
                                <button class="btn-icon delete" onclick="confirmDelete('${entries[0].id}', '${sessionId || ''}')" title="Delete">${icon('trash-2')}</button>
                            </div>
                        </div>`;
                } else {
                    // Single-component feed
                    const entry = entries[0];
                    const feedIcon = entry.feed_type === 'bottle' ? icon('milk') : entry.feed_type === 'solids' ? icon('utensils') : icon('milk');
                    const typeLabel = entry.feed_type.charAt(0).toUpperCase() + entry.feed_type.slice(1);
                    let detail = '';
                    if (entry.feed_type === 'breast' && entry.breast_side) {
                        detail = entry.breast_side.charAt(0).toUpperCase() + entry.breast_side.slice(1);
                    }
                    if (entry.feed_type === 'bottle' && entry.volume_ml) {
                        detail = entry.volume_ml + ' mL';
                    }
                    const duration = entry.end_time ? formatDuration(durationBetween(entry.start_time, entry.end_time)) : '—';
                    const entryNotes = entry.notes ? ` · ${entry.notes}` : '';

                    html += `
                        <div class="entry-item">
                            <div class="entry-icon">${feedIcon}</div>
                            <div class="entry-content">
                                <div class="entry-title">${typeLabel}${detail ? ' · ' + detail : ''}</div>
                                <div class="entry-meta">${duration}${entryNotes}</div>
                            </div>
                            <div class="entry-time">${formatDateTime(entry.start_time)}</div>
                            <div class="entry-actions">
                                <button class="btn-icon edit" onclick="openEditModal('${entry.session_id || entry.id}')" title="Edit">${icon('pencil')}</button>
                                <button class="btn-icon delete" onclick="confirmDelete('${entry.id}', '${entry.session_id || ''}')" title="Delete">${icon('trash-2')}</button>
                            </div>
                        </div>`;
                }
            }

            container.innerHTML = html;
        }

        // --- Delete ---
        function confirmDelete(id, sessionId) {
            deleteId = id;
            deleteSessionId = sessionId || null;
            const modal = document.getElementById('delete-modal');
            modal.style.display = 'flex';
            document.body.classList.add('modal-open');
            document.getElementById('confirm-delete-btn').onclick = async () => {
                let error;
                if (deleteSessionId) {
                    // Delete all records in the session
                    ({ error } = await sb.from('feedings').delete().eq('session_id', deleteSessionId));
                } else {
                    ({ error } = await sb.from('feedings').delete().eq('id', deleteId));
                }
                if (error) {
                    showToast('Error deleting: ' + error.message, 'error');
                } else {
                    showToast('Entry deleted');
                }
                closeDeleteModal();
                await loadEntries();
                await loadChart();
            };
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').style.display = 'none';
            document.body.classList.remove('modal-open');
            deleteId = null;
            deleteSessionId = null;
        }

        // --- Edit Modal ---
        let editSessionId = null;
        let editRemovedIds = []; // IDs of existing records to delete on save

        async function openEditModal(sessionOrId) {
            const userId = await getUserId();
            // Try fetching by session_id first
            let { data } = await sb.from('feedings').select('*').eq('session_id', sessionOrId).eq('user_id', userId);
            if (!data || data.length === 0) {
                // Fallback: fetch by id
                ({ data } = await sb.from('feedings').select('*').eq('id', sessionOrId).eq('user_id', userId));
            }
            if (!data || data.length === 0) {
                showToast('Could not load entry.', 'error');
                return;
            }

            editEntries = data;
            editSessionId = data[0].session_id || uuid();
            editRemovedIds = [];

            // Ensure all entries share the session_id (for legacy entries without one)
            editEntries.forEach(e => { e._editSessionId = editSessionId; });

            renderEditModal();
            document.getElementById('edit-modal').style.display = 'flex';
            document.body.classList.add('modal-open');
        }

        function renderEditModal() {
            const body = document.getElementById('edit-modal-body');
            let html = '';

            // Existing component cards
            editEntries.forEach((entry, idx) => {
                const feedIcon = entry.feed_type === 'bottle' ? icon('milk') : entry.feed_type === 'solids' ? icon('utensils') : icon('milk');
                const typeLabel = entry.feed_type.charAt(0).toUpperCase() + entry.feed_type.slice(1);
                const sideLabel = entry.breast_side ? ` (${entry.breast_side})` : '';
                const isNew = !entry.id;

                html += `<div class="edit-component-card" id="edit-card-${idx}">
                    <div class="edit-component-header">
                        <span>${feedIcon} ${typeLabel}${sideLabel}</span>
                        ${editEntries.length > 1 || isNew ? `<button class="btn-icon delete" onclick="removeEditComponent(${idx})" title="Remove component">${icon('trash-2')}</button>` : ''}
                    </div>`;

                if (entry.feed_type === 'breast') {
                    html += `
                        <div class="form-group">
                            <label class="form-label">Side</label>
                            <div class="toggle-group">
                                <button class="toggle-btn ${entry.breast_side === 'left' ? 'active' : ''}" onclick="setEditSide(${idx}, 'left', this)">Left</button>
                                <button class="toggle-btn ${entry.breast_side === 'right' ? 'active' : ''}" onclick="setEditSide(${idx}, 'right', this)">Right</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Start Time</label>
                            <input type="datetime-local" class="form-input" id="edit-start-${idx}" value="${toDatetimeLocal(new Date(entry.start_time))}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">End Time</label>
                            <input type="datetime-local" class="form-input" id="edit-end-${idx}" value="${entry.end_time ? toDatetimeLocal(new Date(entry.end_time)) : ''}">
                        </div>`;
                }

                if (entry.feed_type === 'bottle') {
                    html += `
                        <div class="form-group">
                            <label class="form-label">Volume (mL)</label>
                            <input type="number" class="form-input" id="edit-volume-${idx}" value="${entry.volume_ml || ''}" min="0" step="5">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Time</label>
                            <input type="datetime-local" class="form-input" id="edit-start-${idx}" value="${toDatetimeLocal(new Date(entry.start_time))}">
                        </div>`;
                }

                if (entry.feed_type === 'solids') {
                    html += `
                        <div class="form-group">
                            <label class="form-label">Start Time</label>
                            <input type="datetime-local" class="form-input" id="edit-start-${idx}" value="${toDatetimeLocal(new Date(entry.start_time))}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">End Time</label>
                            <input type="datetime-local" class="form-input" id="edit-end-${idx}" value="${entry.end_time ? toDatetimeLocal(new Date(entry.end_time)) : ''}">
                        </div>`;
                }

                html += `
                    <div class="form-group">
                        <label class="form-label">Notes</label>
                        <textarea class="form-textarea" id="edit-notes-${idx}" rows="1">${entry.notes || ''}</textarea>
                    </div>
                </div>`;
            });

            // Add Component bar
            html += `
                <div class="edit-add-bar">
                    <label class="form-label">Add Component</label>
                    <div class="edit-add-buttons">
                        <button class="btn btn-secondary btn-small" onclick="addEditComponent('bottle')">${icon('milk')} Bottle</button>
                        <button class="btn btn-secondary btn-small" onclick="addEditComponent('solids')">${icon('utensils')} Solids</button>
                    </div>
                </div>`;

            html += `<div style="display:flex; gap:8px; margin-top:16px;">
                <button class="btn btn-secondary" onclick="closeEditModal()" style="flex:1;">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()" style="flex:1;">Save Changes</button>
            </div>`;

            body.innerHTML = html;
        }

        function addEditComponent(feedType, side) {
            // Collect current form values before re-render
            collectEditFormValues();

            // Reference time from existing entries
            const refTime = editEntries.length > 0 ? editEntries[0].start_time : new Date().toISOString();

            const newEntry = {
                // no id means it's new and will be inserted on save
                feed_type: feedType,
                start_time: refTime,
                end_time: feedType === 'bottle' ? refTime : null,
                notes: null,
            };
            if (feedType === 'breast') newEntry.breast_side = side || 'left';
            if (feedType === 'bottle') newEntry.volume_ml = null;

            editEntries.push(newEntry);
            renderEditModal();
        }

        function removeEditComponent(idx) {
            // Collect form values first
            collectEditFormValues();

            const entry = editEntries[idx];
            if (entry.id) {
                // Existing DB record — mark for deletion
                editRemovedIds.push(entry.id);
            }
            editEntries.splice(idx, 1);

            if (editEntries.length === 0) {
                closeEditModal();
                return;
            }
            renderEditModal();
        }

        // Reads current form input values back into editEntries before re-render
        function collectEditFormValues() {
            editEntries.forEach((entry, i) => {
                const startEl = document.getElementById(`edit-start-${i}`);
                const endEl = document.getElementById(`edit-end-${i}`);
                const volEl = document.getElementById(`edit-volume-${i}`);
                const notesEl = document.getElementById(`edit-notes-${i}`);

                if (startEl && startEl.value) entry.start_time = new Date(startEl.value).toISOString();
                if (endEl) entry.end_time = endEl.value ? new Date(endEl.value).toISOString() : null;
                if (volEl) entry.volume_ml = volEl.value ? Number(volEl.value) : null;
                if (notesEl) entry.notes = notesEl.value.trim() || null;
            });
        }

        function setEditSide(idx, side, btn) {
            editEntries[idx].breast_side = side;
            const group = btn.parentElement;
            group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function saveEdit() {
            const userId = await getUserId();

            // Collect final form values
            collectEditFormValues();

            // 1. Delete removed components
            for (const id of editRemovedIds) {
                const { error } = await sb.from('feedings').delete().eq('id', id);
                if (error) {
                    showToast('Error removing component: ' + error.message, 'error');
                    return;
                }
            }

            // 2. Update existing + insert new
            for (const entry of editEntries) {
                const record = {
                    feed_type: entry.feed_type,
                    start_time: entry.start_time,
                    end_time: entry.end_time || null,
                    notes: entry.notes || null,
                    breast_side: entry.feed_type === 'breast' ? entry.breast_side : null,
                    volume_ml: entry.feed_type === 'bottle' ? (entry.volume_ml || null) : null,
                    session_id: editSessionId,
                };

                if (entry.id) {
                    // Update existing
                    const { error } = await sb.from('feedings').update(record).eq('id', entry.id);
                    if (error) {
                        showToast('Error updating: ' + error.message, 'error');
                        return;
                    }
                } else {
                    // Insert new component
                    record.user_id = userId;
                    const { error } = await sb.from('feedings').insert(record);
                    if (error) {
                        showToast('Error adding component: ' + error.message, 'error');
                        return;
                    }
                }
            }

            // 3. If original entries had no session_id, update them to share one now
            // (this is already handled above since we set session_id on all updates)

            showToast('Feed updated!');
            closeEditModal();
            await loadEntries();
            await loadChart();
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
            document.body.classList.remove('modal-open');
            editEntries = null;
            editSessionId = null;
            editRemovedIds = [];
        }

        // ============================================================
        //  Burp Timer — "2 and 1" Method
        //  DOWN for 2 minutes, UP for 1 minute, repeat until done
        // ============================================================
        const BURP_DOWN_SECS = 120;
        const BURP_UP_SECS = 60;

        let burpInterval = null;
        let burpTotalRemaining = 0;
        let burpPhaseRemaining = 0;
        let burpPhase = 'down'; // 'down' or 'up'
        let burpCycle = 1;
        let burpTotalDuration = 0;
        let burpAudioCtx = null;

        function startBurpTimer() {
            const mins = parseInt(document.getElementById('burp-duration').value, 10);
            if (!mins || mins < 1 || mins > 60) {
                showToast('Enter a duration between 1 and 60 minutes.', 'error');
                return;
            }

            burpTotalDuration = mins * 60;
            burpTotalRemaining = burpTotalDuration;
            burpPhase = 'down';
            burpPhaseRemaining = BURP_DOWN_SECS;
            burpCycle = 1;

            document.getElementById('burp-setup').style.display = 'none';
            document.getElementById('burp-done').style.display = 'none';
            document.getElementById('burp-active').style.display = 'block';

            updateBurpDisplay();
            playBurpChime();

            burpInterval = setInterval(tickBurpTimer, 1000);
        }

        function tickBurpTimer() {
            burpTotalRemaining--;
            burpPhaseRemaining--;

            if (burpTotalRemaining <= 0) {
                clearInterval(burpInterval);
                burpInterval = null;
                playBurpChime(true);
                document.getElementById('burp-active').style.display = 'none';
                document.getElementById('burp-done').style.display = 'block';
                return;
            }

            if (burpPhaseRemaining <= 0) {
                if (burpPhase === 'down') {
                    burpPhase = 'up';
                    burpPhaseRemaining = Math.min(BURP_UP_SECS, burpTotalRemaining);
                } else {
                    burpPhase = 'down';
                    burpPhaseRemaining = Math.min(BURP_DOWN_SECS, burpTotalRemaining);
                    burpCycle++;
                }
                playBurpChime();
                triggerPhaseAnimation();
            }

            updateBurpDisplay();
        }

        function updateBurpDisplay() {
            const phaseDisplay = document.getElementById('burp-phase-display');
            const phaseIcon = document.getElementById('burp-phase-icon');
            const phaseLabel = document.getElementById('burp-phase-label');
            const phaseCountdown = document.getElementById('burp-phase-countdown');
            const cycleLabel = document.getElementById('burp-cycle-label');
            const totalCountdown = document.getElementById('burp-total-countdown');
            const progressFill = document.getElementById('burp-progress-fill');

            phaseDisplay.className = 'burp-phase-display ' + burpPhase;

            if (burpPhase === 'down') {
                phaseIcon.innerHTML = icon('arrow-down', 'icon-2xl');
                phaseLabel.textContent = 'DOWN';
            } else {
                phaseIcon.innerHTML = icon('arrow-up', 'icon-2xl');
                phaseLabel.textContent = 'UP';
            }

            phaseCountdown.textContent = formatSecsToTimer(burpPhaseRemaining);
            cycleLabel.textContent = 'Cycle ' + burpCycle;
            totalCountdown.textContent = formatSecsToTimer(burpTotalRemaining) + ' remaining';

            const pct = ((burpTotalDuration - burpTotalRemaining) / burpTotalDuration) * 100;
            progressFill.style.width = pct + '%';
        }

        function triggerPhaseAnimation() {
            const el = document.getElementById('burp-phase-display');
            el.classList.remove('phase-change');
            void el.offsetWidth;
            el.classList.add('phase-change');
        }

        function stopBurpTimer() {
            if (burpInterval) {
                clearInterval(burpInterval);
                burpInterval = null;
            }
            resetBurpTimer();
        }

        function resetBurpTimer() {
            if (burpInterval) {
                clearInterval(burpInterval);
                burpInterval = null;
            }
            document.getElementById('burp-active').style.display = 'none';
            document.getElementById('burp-done').style.display = 'none';
            document.getElementById('burp-setup').style.display = 'block';
        }

        function formatSecsToTimer(secs) {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return m + ':' + String(s).padStart(2, '0');
        }

        function playBurpChime(isEnd) {
            try {
                if (!burpAudioCtx) {
                    burpAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const ctx = burpAudioCtx;
                if (ctx.state === 'suspended') ctx.resume();

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (isEnd) {
                    osc.frequency.value = 880;
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.6);
                    // Second beep
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.frequency.value = 1100;
                    gain2.gain.setValueAtTime(0.3, ctx.currentTime + 0.2);
                    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
                    osc2.start(ctx.currentTime + 0.2);
                    osc2.stop(ctx.currentTime + 0.8);
                } else {
                    osc.frequency.value = burpPhase === 'down' ? 440 : 660;
                    gain.gain.setValueAtTime(0.25, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (_) {}
        }

        // --- Chart ---
        function setupRangeButtons() {
            document.getElementById('date-range-bar').addEventListener('click', (e) => {
                const btn = e.target.closest('.range-btn');
                if (!btn) return;
                document.querySelectorAll('#date-range-bar .range-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRange = btn.dataset.range;
                loadChart();
            });
        }

        function setChartView(view) {
            chartView = view;
            document.getElementById('chart-view-bytype').classList.toggle('active', view === 'byType');
            document.getElementById('chart-view-total').classList.toggle('active', view === 'total');
            loadChart();
        }

        async function loadChart() {
            const userId = await getUserId();
            const { start, end } = getDateRange(currentRange);

            const { data } = await sb
                .from('feedings')
                .select('start_time, feed_type, volume_ml, session_id')
                .eq('user_id', userId)
                .gte('start_time', start)
                .lte('start_time', end)
                .order('start_time', { ascending: true });

            const entries = data || [];
            const labels = generateDateLabels();

            // Always accumulate mL data for the overlay line
            const mlGrouped = {};
            entries.forEach(e => {
                if (e.feed_type === 'bottle' && e.volume_ml) {
                    const day = new Date(e.start_time).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', timeZone: 'Australia/Darwin' });
                    mlGrouped[day] = (mlGrouped[day] || 0) + e.volume_ml;
                }
            });

            function mapToLabels(labels, grouped) {
                return labels.map(l => grouped[l] || 0);
            }

            function generateDateLabels() {
                const { start } = getDateRange(currentRange);
                const labels = [];
                const d = new Date(start);
                const now = new Date();
                while (d <= now) {
                    labels.push(d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', timeZone: 'Australia/Darwin' }));
                    d.setDate(d.getDate() + 1);
                }
                return labels;
            }

            const mlData = mapToLabels(labels, mlGrouped);
            const hasML = mlData.some(v => v > 0);

            let datasets;

            if (chartView === 'total') {
                // Count distinct sessions per day
                const sessionsByDay = {};
                entries.forEach(e => {
                    const day = new Date(e.start_time).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', timeZone: 'Australia/Darwin' });
                    if (!sessionsByDay[day]) sessionsByDay[day] = new Set();
                    sessionsByDay[day].add(e.session_id || e.start_time);
                });
                const totalGrouped = {};
                Object.keys(sessionsByDay).forEach(day => {
                    totalGrouped[day] = sessionsByDay[day].size;
                });
                datasets = [{
                    label: 'Total Sessions',
                    data: mapToLabels(labels, totalGrouped),
                    backgroundColor: 'rgba(108, 99, 255, 0.15)',
                    borderColor: '#6c63ff',
                    borderWidth: 1.5,
                    borderRadius: 4,
                    yAxisID: 'y',
                }];
            } else {
                const breastGrouped = {};
                const bottleGrouped = {};
                const solidsGrouped = {};

                entries.forEach(e => {
                    const day = new Date(e.start_time).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', timeZone: 'Australia/Darwin' });
                    if (e.feed_type === 'breast') breastGrouped[day] = (breastGrouped[day] || 0) + 1;
                    else if (e.feed_type === 'bottle') bottleGrouped[day] = (bottleGrouped[day] || 0) + 1;
                    else solidsGrouped[day] = (solidsGrouped[day] || 0) + 1;
                });

                datasets = [
                    {
                        label: 'Breast',
                        data: mapToLabels(labels, breastGrouped),
                        backgroundColor: 'rgba(108, 99, 255, 0.15)',
                        borderColor: '#6c63ff',
                        borderWidth: 1.5,
                        borderRadius: 4,
                        yAxisID: 'y',
                    },
                    {
                        label: 'Bottle',
                        data: mapToLabels(labels, bottleGrouped),
                        backgroundColor: 'rgba(76, 201, 240, 0.15)',
                        borderColor: '#4cc9f0',
                        borderWidth: 1.5,
                        borderRadius: 4,
                        yAxisID: 'y',
                    },
                    {
                        label: 'Solids',
                        data: mapToLabels(labels, solidsGrouped),
                        backgroundColor: 'rgba(245, 166, 35, 0.15)',
                        borderColor: '#f5a623',
                        borderWidth: 1.5,
                        borderRadius: 4,
                        yAxisID: 'y',
                    },
                ];
            }

            // Add mL overlay line if there's bottle volume data
            if (hasML) {
                datasets.push({
                    label: 'Bottle mL',
                    data: mlData,
                    type: 'line',
                    borderColor: '#4cc9f0',
                    backgroundColor: 'rgba(76, 201, 240, 0.08)',
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: '#4cc9f0',
                    tension: 0.3,
                    fill: true,
                    yAxisID: 'y1',
                });
            }

            const isStacked = chartView === 'byType';

            if (feedingChart) feedingChart.destroy();
            feedingChart = new Chart(document.getElementById('feeding-chart'), {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: { boxWidth: 12, padding: 12 },
                        },
                        tooltip: {
                            backgroundColor: '#1e2029',
                            borderColor: '#2e3142',
                            borderWidth: 1,
                            padding: 10,
                            cornerRadius: 8,
                        },
                    },
                    scales: {
                        x: {
                            stacked: isStacked,
                            grid: { display: false },
                            ticks: { maxRotation: 45, font: { size: 11 }, maxTicksLimit: 10 },
                        },
                        y: {
                            stacked: isStacked,
                            beginAtZero: true,
                            grid: { color: '#2e3142' },
                            title: { display: true, text: 'Count', font: { size: 12 } },
                            ticks: { font: { size: 11 }, precision: 0 },
                        },
                        ...(hasML ? {
                            y1: {
                                position: 'right',
                                beginAtZero: true,
                                grid: { display: false },
                                title: { display: true, text: 'mL', font: { size: 12 } },
                                ticks: { font: { size: 11 }, precision: 0 },
                            },
                        } : {}),
                    },
                },
            });
        }
    </script>
</body>
</html>
